<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Transactions</title>
    <link rel="icon" type="image/png" href="money.png">
    <style>
        :root {
            --primary: #3ecf8e;
            --bg: #f4f4f5;
            --card: #ffffff;
            --text: #1f2937;
            --border: #ddd;
            --border-light: #eee;
            --input-bg: #ffffff;
            --tag-bg: #eee;
            --tag-text: #666;
            --muted: #888;
            --dialog-bg: #ffffff;
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #18181b;
                --card: #27272a;
                --text: #f4f4f5;
                --border: #3f3f46;
                --border-light: #3f3f46;
                --input-bg: #18181b;
                --tag-bg: #3f3f46;
                --tag-text: #d4d4d8;
                --muted: #a1a1aa;
                --dialog-bg: #27272a;
            }
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            padding-top: 50px;
            margin: 0;
        }
        .container {
            background-color: var(--card);
            width: 500px;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
        h1 { margin: 0; font-size: 1.5rem; }
        a { color: var(--primary); text-decoration: none; font-weight: bold; }
        a:hover { text-decoration: underline; }
        
        .filter-section { margin-bottom: 1.5rem; text-align: center; }
        input[type="month"] { padding: 8px; border: 1px solid var(--border); border-radius: 6px; font-size: 1rem; background: var(--input-bg); color: var(--text); }

        ul { list-style: none; padding: 0; }
        li { display: flex; justify-content: space-between; padding: 12px; border-bottom: 1px solid var(--border-light); }
        li:last-child { border-bottom: none; }
        .amount { font-weight: bold; color: var(--primary); }
        .category-tag { font-size: 0.8rem; color: var(--tag-text); background: var(--tag-bg); padding: 2px 6px; border-radius: 4px; margin-right: 8px; }
        .date-small { display: block; font-size: 0.75rem; color: var(--muted); margin-top: 2px; }
        .loading { text-align: center; color: var(--muted); display: block; }

        .actions { display: flex; align-items: center; gap: 10px; }
        .btn-small { padding: 5px 10px; font-size: 0.8rem; cursor: pointer; border-radius: 4px; border: 1px solid var(--border); background: var(--input-bg); transition: all 0.2s; }
        .edit-btn { color: #3b82f6; border-color: #3b82f6; }
        .edit-btn:hover { background: #3b82f6; color: white; }
        .delete-btn { color: #ef4444; border-color: #ef4444; }
        .delete-btn:hover { background: #ef4444; color: white; }

        /* Dialog Styles */
        dialog { border: none; border-radius: 12px; padding: 20px; width: 320px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); background: var(--dialog-bg); color: var(--text); }
        dialog::backdrop { background: rgba(0,0,0,0.5); }
        .dialog-title { margin-top: 0; margin-bottom: 15px; font-size: 1.2rem; }
        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; margin-bottom: 5px; font-size: 0.9rem; color: var(--text); }
        .form-group input, .form-group select { width: 100%; padding: 8px; border: 1px solid var(--border); border-radius: 6px; box-sizing: border-box; background: var(--input-bg); color: var(--text); }
        .dialog-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px; }
        .btn-cancel { background: var(--tag-bg); color: var(--text); border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; }
        .btn-save { background: var(--primary); color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-weight: bold; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .container { animation: fadeIn 0.6s ease-out; }
        li { animation: fadeIn 0.4s ease-out; }
        dialog[open] { animation: fadeIn 0.3s ease-out; }

        .top-right-name {
            position: fixed;
            top: 10px;
            right: 15px;
            font-size: 0.9rem;
            color: var(--muted);
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="top-right-name">Lokeswar</div>
    <div class="container">
        <div class="header">
            <h1>Transactions</h1>
            <a href="index.html">&larr; Back</a>
        </div>

        <div class="filter-section">
            <input type="month" id="monthFilter">
        </div>

        <dialog id="editDialog">
            <form id="editForm">
                <h3 class="dialog-title">Edit Transaction</h3>
                <input type="hidden" id="editId">
                <div class="form-group">
                    <label>Category</label>
                    <select id="editCategory" required>
                        <option value="Food (Breakfast)">Food (Breakfast)</option>
                        <option value="Food (Lunch)">Food (Lunch)</option>
                        <option value="Food (Dinner)">Food (Dinner)</option>
                        <option value="Drinks and Snacks">Drinks and Snacks</option>
                        <option value="Needs">Needs</option>
                        <option value="Shopping">Shopping</option>
                        <option value="Others">Others</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <input type="text" id="editDescription" required>
                </div>
                <div class="form-group">
                    <label>Amount</label>
                    <input type="number" id="editAmount" step="0.01" required>
                </div>
                <div class="dialog-actions">
                    <button type="button" class="btn-cancel" id="cancelEdit">Cancel</button>
                    <button type="submit" class="btn-save">Save Changes</button>
                </div>
            </form>
        </dialog>

        <ul id="expenseList">
            <li class="loading">Loading...</li>
        </ul>
    </div>

    <script type="module">
        import { createClient } from 'https://esm.sh/@supabase/supabase-js@2'
        import { SUPABASE_URL, SUPABASE_KEY } from './config.js'

        const supabase = createClient(SUPABASE_URL, SUPABASE_KEY)
        const list = document.getElementById('expenseList')
        const monthFilter = document.getElementById('monthFilter')
        const editDialog = document.getElementById('editDialog')
        const editForm = document.getElementById('editForm')
        const cancelEditBtn = document.getElementById('cancelEdit')

        // Set default to current month (YYYY-MM)
        monthFilter.value = new Date().toISOString().slice(0, 7)

        monthFilter.addEventListener('change', () => fetchTransactions(monthFilter.value))

        async function fetchTransactions(selectedMonth) {
            list.innerHTML = '<li class="loading">Loading...</li>'

            // Calculate date range for the selected month
            const [year, month] = selectedMonth.split('-')
            const startDate = new Date(year, month - 1, 1).toISOString()
            const endDate = new Date(year, month, 0, 23, 59, 59).toISOString()

            const { data, error } = await supabase
                .from('expenses')
                .select('*')
                .gte('created_at', startDate)
                .lte('created_at', endDate)
                .order('created_at', { ascending: false })

            if (error) {
                list.innerHTML = '<li style="color:red">Error loading data</li>'
                return
            }

            if (data.length === 0) {
                list.innerHTML = '<li class="loading">No transactions found for this month.</li>'
                return
            }

            list.innerHTML = ''
            data.forEach(expense => {
                const dateObj = new Date(expense.created_at)
                const dateStr = dateObj.toLocaleDateString()

                const li = document.createElement('li')
                
                // Info Section
                const infoDiv = document.createElement('div')
                infoDiv.innerHTML = `
                    <span class="category-tag">${expense.category || 'Other'}</span>
                    ${expense.description}
                    <span class="date-small">${dateStr}</span>
                `

                // Actions Section
                const actionsDiv = document.createElement('div')
                actionsDiv.className = 'actions'
                
                const amountSpan = document.createElement('span')
                amountSpan.className = 'amount'
                amountSpan.textContent = `₹${parseFloat(expense.amount).toFixed(2)}`
                
                const editBtn = document.createElement('button')
                editBtn.className = 'btn-small edit-btn'
                editBtn.textContent = 'Edit'
                editBtn.onclick = () => openEdit(expense)

                const deleteBtn = document.createElement('button')
                deleteBtn.className = 'btn-small delete-btn'
                deleteBtn.textContent = 'Delete'
                deleteBtn.onclick = () => deleteTransaction(expense.id)

                actionsDiv.append(amountSpan, editBtn, deleteBtn)
                li.append(infoDiv, actionsDiv)
                list.appendChild(li)
            })
        }

        // Delete Function
        async function deleteTransaction(id) {
            if (!confirm('Are you sure you want to delete this transaction?')) return

            const { error } = await supabase.from('expenses').delete().eq('id', id)
            if (error) {
                alert('Error deleting: ' + error.message)
            } else {
                fetchTransactions(monthFilter.value)
            }
        }

        // Edit Functions
        function openEdit(expense) {
            document.getElementById('editId').value = expense.id
            document.getElementById('editCategory').value = expense.category || 'Others'
            document.getElementById('editDescription').value = expense.description
            document.getElementById('editAmount').value = expense.amount
            editDialog.showModal()
        }

        cancelEditBtn.addEventListener('click', () => editDialog.close())

        editForm.addEventListener('submit', async (e) => {
            e.preventDefault()
            const id = document.getElementById('editId').value
            const updates = {
                category: document.getElementById('editCategory').value,
                description: document.getElementById('editDescription').value,
                amount: document.getElementById('editAmount').value
            }

            const { error } = await supabase.from('expenses').update(updates).eq('id', id)
            
            if (error) {
                alert('Error updating: ' + error.message)
            } else {
                editDialog.close()
                fetchTransactions(monthFilter.value)
            }
        })

        // Initial load
        fetchTransactions(monthFilter.value)
    </script>
</body>
</html>
